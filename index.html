:root {
  --bg: #dce7f4;
  --glass: rgba(255,255,255,0.50);
  --gb: rgba(255,255,255,0.70);
  --gsh: 0 8px 32px rgba(80,110,180,0.12);
  --text: #18192e;
  --muted: #7a80a0;
  --radius: 28px;
  --green: #3ecf8e;
  --orange: #ff6b35;
  --blue: #4a7cdc;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --pink: #ec4899;
}
* { margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent; }

body {
  font-family:'TTNorms','Helvetica Neue',sans-serif;
  font-weight:200;
  background: linear-gradient(150deg, #cfddf0 0%, #ddd5f0 50%, #d5eee3 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 90px;
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; top:-160px; left:-100px;
  width:480px; height:480px;
  background: radial-gradient(circle, rgba(70,130,255,0.18), transparent 70%);
  border-radius:50%; pointer-events:none; z-index:0;
}
body::after {
  content:''; position:fixed; bottom:-130px; right:-80px;
  width:420px; height:420px;
  background: radial-gradient(circle, rgba(150,80,255,0.14), transparent 70%);
  border-radius:50%; pointer-events:none; z-index:0;
}

/* HEADER */
.header {
  position: sticky; top:0; z-index:50;
  background: rgba(255,255,255,0.56);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.78);
  padding: 14px 22px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.app-name {
  font-family: 'FuturaPT', sans-serif;
  font-size: 22px; letter-spacing: 0.05em; color: var(--text);
}
.app-name em { font-style:normal; color: var(--green); }
.header-right { display:flex; align-items:center; gap:10px; }
.greeting-small { font-size:12px; color:var(--muted); text-align:right; line-height:1.45; }
.greeting-small strong { color:var(--text); font-weight:200; font-family:'FuturaPT',sans-serif; }
.streak-pill {
  display:flex; align-items:center; gap:5px;
  background: rgba(255,107,53,0.10);
  border: 1px solid rgba(255,107,53,0.22);
  border-radius: 50px; padding: 6px 12px;
  font-family:'FuturaPT',sans-serif; font-size:13px; color:var(--orange); letter-spacing:0.03em;
}

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background: rgba(255,255,255,0.68);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.82);
  display:flex; justify-content:space-around;
  padding: 8px 0 18px; z-index:100;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; padding:4px 8px; border-radius:14px;
  transition:all 0.2s; min-width:44px;
}
.nav-illus { width:28px; height:28px; transition:transform 0.25s; }
.nav-label { font-size:9px; color:var(--muted); transition:color 0.2s; letter-spacing:0.03em; font-family:'TTNorms',sans-serif; }
.nav-item.active .nav-label { color:var(--green); }
.nav-item.active .nav-illus { transform:scale(1.2); }
.nav-dot { width:4px; height:4px; border-radius:50%; background:var(--green); opacity:0; transition:opacity 0.2s; }
.nav-item.active .nav-dot { opacity:1; }

/* CONTENT */
.content { padding:16px; position:relative; z-index:1; }
.section { display:none; animation:fadeUp 0.3s ease; }
.section.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* GLASS CARD */
.card {
  background: var(--glass);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--gb);
  border-radius: var(--radius);
  padding: 22px; margin-bottom: 14px;
  box-shadow: var(--gsh);
  position: relative; z-index:1; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
}
.card-title {
  font-family: 'FuturaPT', sans-serif;
  font-size: 15px; letter-spacing: 0.06em;
  color: var(--text); margin-bottom: 18px;
  display:flex; align-items:center; gap:10px;
}

/* HERO */
.hero-card {
  background: linear-gradient(135deg, rgba(62,207,142,0.18), rgba(74,124,220,0.14));
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.74);
  border-radius: var(--radius); padding: 26px 24px; margin-bottom: 14px;
  box-shadow: var(--gsh);
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  position:relative; z-index:1; overflow:hidden;
}
.hero-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
}
.hero-label { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.hero-kcal { font-family:'FuturaPT',sans-serif; font-size:58px; line-height:1; color:var(--text); letter-spacing:-0.01em; }
.hero-target { font-size:13px; color:var(--muted); margin-top:5px; }
.hero-badge {
  display:inline-flex; align-items:center; gap:5px;
  background: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.9);
  border-radius:50px; padding:5px 12px;
  font-family:'FuturaPT',sans-serif; font-size:11px; color:var(--green);
  margin-top:10px; letter-spacing:0.05em;
}
.ring-wrap { position:relative; width:94px; height:94px; flex-shrink:0; }
.ring-svg { width:100%; height:100%; transform:rotate(-90deg); }
.ring-inside { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.ring-pct { font-family:'FuturaPT',sans-serif; font-size:18px; color:var(--text); line-height:1; letter-spacing:0.03em; }
.ring-sub { font-size:8px; color:var(--muted); letter-spacing:0.08em; margin-top:2px; text-transform:uppercase; }

/* MACRO */
.macro-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.macro-card {
  background: var(--glass);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border: 1px solid var(--gb); border-radius:22px;
  padding:16px 10px; text-align:center;
  box-shadow: var(--gsh); position:relative; overflow:hidden; z-index:1;
}
.macro-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent); }
.macro-ring-wrap { width:54px; height:54px; margin:0 auto 8px; position:relative; }
.macro-ring-svg { width:100%; height:100%; transform:rotate(-90deg); }
.macro-value { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'FuturaPT',sans-serif; font-size:10px; letter-spacing:0.02em; }
.macro-gram { font-family:'FuturaPT',sans-serif; font-size:16px; margin-bottom:2px; letter-spacing:0.02em; }
.macro-label { font-size:11px; color:var(--muted); letter-spacing:0.04em; }

/* MEALS */
.meal-row { display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
.meal-row:last-child { border-bottom:none; }
.meal-illus { width:46px; height:46px; border-radius:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
.meal-info { flex:1; min-width:0; }
.meal-name { font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.meal-time { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:0.04em; }
.meal-kcal { background:rgba(255,107,53,0.09); border:1px solid rgba(255,107,53,0.18); border-radius:50px; padding:4px 10px; font-family:'FuturaPT',sans-serif; font-size:11px; color:var(--orange); white-space:nowrap; letter-spacing:0.04em; }

/* WEEK */
.week-day-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
.week-day-row:last-child { border-bottom:none; }
.week-day-label { font-family:'FuturaPT',sans-serif; font-size:12px; color:var(--muted); min-width:28px; letter-spacing:0.04em; }
.week-day-bar-bg { flex:1; height:7px; background:rgba(0,0,0,0.06); border-radius:50px; overflow:hidden; }
.week-day-bar-fill { height:100%; border-radius:50px; transition:width 0.9s ease; }
.week-day-kcal { font-family:'FuturaPT',sans-serif; font-size:12px; min-width:40px; text-align:right; letter-spacing:0.02em; }
.chart-wrap { height:176px; position:relative; }

/* GOAL */
.goal-options { display:flex; flex-direction:column; gap:10px; }
.goal-opt { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.38); border-radius:18px; padding:15px 16px; cursor:pointer; border:1.5px solid transparent; transition:all 0.2s; }
.goal-opt.active { background:rgba(62,207,142,0.12); border-color:rgba(62,207,142,0.38); }
.goal-opt-title { font-family:'FuturaPT',sans-serif; font-size:14px; letter-spacing:0.03em; }
.goal-opt-desc { font-size:12px; color:var(--muted); margin-top:2px; }
.goal-check { margin-left:auto; color:var(--green); font-family:'FuturaPT',sans-serif; font-size:18px; }
.calorie-norm { text-align:center; padding:18px 0; }
.calorie-norm-num { font-family:'FuturaPT',sans-serif; font-size:58px; color:var(--orange); letter-spacing:-0.01em; }
.macro-norm-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
.macro-norm-item { background:rgba(255,255,255,0.48); border-radius:16px; padding:13px; text-align:center; }
.macro-norm-val { font-family:'FuturaPT',sans-serif; font-size:18px; letter-spacing:0.02em; }

.weight-unit { font-size:20px; color:var(--muted); margin-left:4px; }

.weight-delta.down { color:var(--green); }
.weight-delta.up { color:var(--orange); }

/* WATER */
.water-circle-wrap { width:168px; height:168px; margin:16px auto; position:relative; }

.water-inside { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.water-ml-num { font-family:'FuturaPT',sans-serif; font-size:36px; color:var(--blue); line-height:1; letter-spacing:-0.01em; }
.water-unit-lbl { font-size:11px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
.water-btns { display:flex; gap:8px; justify-content:center; margin:16px 0; flex-wrap:wrap; }
.water-btn { background:rgba(74,124,220,0.10); border:1px solid rgba(74,124,220,0.20); color:var(--blue); border-radius:50px; padding:10px 18px; font-size:12px; font-family:'FuturaPT',sans-serif; letter-spacing:0.05em; cursor:pointer; transition:all 0.2s; }
.water-btn:active { transform:scale(0.93); background:rgba(74,124,220,0.2); }
.water-glasses { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:6px; }
.water-glass { font-size:20px; opacity:0.18; transition:all 0.3s; }
.water-glass.filled { opacity:1; transform:scale(1.12); }
.water-progress-label { text-align:center; font-size:12px; color:var(--muted); letter-spacing:0.06em; margin-top:8px; }

/* RECIPES / SHOPPING */
.recipe-item { padding:15px 0; border-bottom:1px solid rgba(0,0,0,0.05); cursor:pointer; }
.recipe-item:last-child { border-bottom:none; }
.recipe-header { display:flex; justify-content:space-between; align-items:center; }
.recipe-name { font-family:'FuturaPT',sans-serif; font-size:14px; letter-spacing:0.03em; }
.recipe-date { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:0.04em; }
.recipe-arrow { color:var(--muted); font-size:11px; transition:transform 0.2s; flex-shrink:0; }
.recipe-body { font-size:13px; color:#555; line-height:1.75; margin-top:12px; padding:16px; background:rgba(255,255,255,0.48); border-radius:16px; display:none; }
.shop-item { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(0,0,0,0.05); cursor:pointer; transition:opacity 0.2s; }
.shop-item:last-child { border-bottom:none; }
.shop-item.checked { opacity:0.38; }
.shop-item.checked .shop-name { text-decoration:line-through; }
.shop-check { font-size:22px; flex-shrink:0; }
.shop-name { font-size:14px; }

/* ACHIEVEMENTS */
.streak-hero {
  background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(251,191,36,0.08));

  border: 1px solid rgba(255,255,255,0.74);
  border-radius:var(--radius); padding:30px 20px; text-align:center;
  margin-bottom:14px; box-shadow:var(--gsh); position:relative; overflow:hidden; z-index:1;
}
.streak-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.95),transparent); }
.streak-fire { font-size:52px; animation:bounce 2s infinite; }

.streak-num { font-family:'FuturaPT',sans-serif; font-size:76px; color:var(--orange); line-height:1; letter-spacing:-0.02em; }
.streak-text { font-size:12px; color:var(--muted); letter-spacing:0.09em; margin-top:4px; text-transform:uppercase; }
.streak-dots { display:flex; justify-content:center; gap:8px; margin-top:18px; }
.streak-dot { width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(0,0,0,0.1); display:flex; align-items:center; justify-content:center; font-family:'FuturaPT',sans-serif; font-size:10px; color:var(--muted); letter-spacing:0.04em; }
.streak-dot.done { background:var(--yellow); border-color:var(--yellow); color:white; }

.ach-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.ach { background:var(--glass); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid var(--gb); border-radius:22px; padding:20px; text-align:center; box-shadow:var(--gsh); position:relative; overflow:hidden; }
.ach::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent); }

.ach-icon { font-size:34px; margin-bottom:8px; }
.ach-name { font-family:'FuturaPT',sans-serif; font-size:13px; letter-spacing:0.03em; }
.ach-desc { font-size:11px; color:var(--muted); margin-top:3px; }

/* EMPTY / LOADING */
.empty { text-align:center; padding:52px 20px; }
.empty-icon { font-size:52px; margin-bottom:14px; }
.empty-title { font-family:'FuturaPT',sans-serif; font-size:16px; letter-spacing:0.04em; }
.empty-sub { font-size:13px; color:var(--muted); margin-top:5px; line-height:1.5; }
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
.spinner { width:44px; height:44px; border:2.5px solid rgba(0,0,0,0.07); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }

.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}

.cal-cell.no-data{cursor:default;}

.cal-cell.over-norm .cal-dot{background:var(--orange);}

.cal-cell.selected .cal-num{color:white!important;font-size:14px;}

.cal-cell:not(.other):not(.no-data):active{transform:scale(0.85);}
.cal-day-label{text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,0.05);font-family:'FuturaPT',sans-serif;font-size:12px;letter-spacing:0.07em;color:var(--muted);}

function getMealIllus(name,i){
  const n=name.toLowerCase(),bg=mBgSolid[i%mBgSolid.length];
  if(n.includes('\u0441\u0443\u043f')||n.includes('\u0431\u043e\u0440\u0449'))return MEAL_ILLUS.soup(bg);
  if(n.includes('\u0441\u0430\u043b\u0430\u0442'))return MEAL_ILLUS.salad(bg);
  if(n.includes('\u043e\u0432\u0441\u044f\u043d')||n.includes('\u043a\u0430\u0448\u0430'))return MEAL_ILLUS.porridge(bg);
  if(n.includes('\u043a\u0443\u0440\u0438\u043d')||n.includes('\u0446\u044b\u043f'))return MEAL_ILLUS.chicken(bg);
  return MEAL_ILLUS.default(bg);
}

async function fetchUserData(uid){
  try{
    const u=await(await fetch(API_BASE+'/api/user/'+uid)).json();
    if(!u||!Object.keys(u).length)return null;
    const today=new Date().toISOString().split('T')[0],diary=u.diary||{};
    const dN=['\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431','\u0412\u0441'];
    const week=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const key=d.toISOString().split('T')[0],e=diary[key]||[],dow=d.getDay()===0?6:d.getDay()-1;
      week.push({label:i===0?'\u0421\u0435\u0433':dN[dow],kcal:e.reduce((s,x)=>s+(x.kcal||0),0),p:e.reduce((s,x)=>s+(x.p||0),0),f:e.reduce((s,x)=>s+(x.f||0),0),c:e.reduce((s,x)=>s+(x.c||0),0)});
    }
    let streak=0;
    for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];if(diary[key]?.length>0)streak++;else if(i>0)break;}
    const aM={low:1.2,medium:1.375,high:1.55,very_high:1.725};
    let cal=u.target_calories||2000;
    if(u.weight&&u.height&&u.age){const b=10*u.weight+6.25*u.height-5*u.age-161,t=Math.round(b*(aM[u.activity]||1.375)),g=u.goal||'maintain';cal=g==='lose'?Math.round(t*0.85):g==='gain'?Math.round(t*1.15):t;}
    return{name:u.name||'\u0434\u0440\u0443\u0433',target_calories:cal,goal:u.goal||'maintain',weight:u.weight||0,weight_history:(u.weight_history||[]).map(e=>e.weight||e),streak:streak||1,week,diary,today_meals:diary[today]||[],saved_recipes:u.saved_recipes||[],shopping_list:u.shopping_list||[],water_today:u.water_today||0};
  }catch(e){return null;}
}

  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  const kcal30=Math.round(act.k/60*30);
  ov.innerHTML='<div class="dur-sheet">'+'<div class="dur-handle"></div>'+'<div class="dur-act-header">'+'<div class="dur-act-emoji">'+act.e+'</div>'+'<div><div class="dur-act-title">'+act.n+'</div>'+'<div class="dur-act-hint">\u0440\u0430\u0441\u0445\u043e\u0434: ~'+act.k+' \u043a\u043a\u0430\u043b/\u0447</div></div></div>'+'<div class="dur-section-label">\u0414\u041b\u0418\u0422\u0415\u041b\u042c\u041d\u041e\u0421\u0422\u042c</div>'+'<div class="dur-presets">'+DUR_OPTS.map(mn=>'<div class="dur-preset '+(mn===30?'active':'')+' " data-m="'+mn+'" onclick="selDur('+mn+')">'+'<div class="dur-min">'+mn+'</div>'+'<div class="dur-kcal">\u043c\u0438\u043d</div></div>').join('')+'</div>'+'<div class="dur-result-box" id="dur-result">'+'<div class="dur-result-lbl">\u0421\u043f\u0430\u043b\u0435\u043d\u043e</div>'+'<div class="dur-result-val" id="dur-result-val">\u2212'+kcal30+' \u043a\u043a\u0430\u043b</div></div>'+'<button class="dur-btn" onclick="confirmAct()">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c</button>'+'</div>';
  document.body.appendChild(ov);
}
function selDur(m){
  _selDur=m;
  document.querySelectorAll('.dur-preset').forEach(el=>{
    const mn=+el.dataset.m;el.classList.toggle('active',mn===m);
  });
  const v=document.getElementById('dur-result-val');
  if(v&&_selAct)v.textContent='\u2212'+Math.round(_selAct.k/60*m)+' \u043a\u043a\u0430\u043b';
}
function confirmAct(){
  if(!_selAct)return;
  const kcal=Math.round(_selAct.k/60*_selDur);
  const key=_curActDay||_tod();
  if(!_actLog[key])_actLog[key]=[];
  const nn=new Date();
  const t=(nn.getHours()<10?'0':'')+nn.getHours()+':'+(nn.getMinutes()<10?'0':'')+nn.getMinutes();
  _actLog[key].push({id:_selAct.id,n:_selAct.n,e:_selAct.e,kcal,dur:_selDur,time:t});
  _saveActs();
  document.getElementById('dur-ov')?.remove();
  renderActLog();renderDay(key);
}

/* === CALENDAR === */
let _cY,_cM,_cSel,_diary={},_gD=null;
const _MO=['\u042f\u043d\u0432\u0430\u0440\u044c','\u0424\u0435\u0432\u0440\u0430\u043b\u044c','\u041c\u0430\u0440\u0442','\u0410\u043f\u0440\u0435\u043b\u044c','\u041c\u0430\u0439','\u0418\u044e\u043d\u044c','\u0418\u044e\u043b\u044c','\u0410\u0432\u0433\u0443\u0441\u0442','\u0421\u0435\u043d\u0442\u044f\u0431\u0440\u044c','\u041e\u043a\u0442\u044f\u0431\u0440\u044c','\u041d\u043e\u044f\u0431\u0440\u044c','\u0414\u0435\u043a\u0430\u0431\u0440\u044c'];
const _DW=['\u0412\u0441','\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431'];
function _dk(y,m,d){return y+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d);}
function _tod(){return new Date().toISOString().split('T')[0];}
function buildCal(){
  const g=document.getElementById('cal-grid'),t=document.getElementById('cal-title');
  if(!g)return;
  t.textContent=_MO[_cM]+' '+_cY;
  const fd=new Date(_cY,_cM,1);let sd=fd.getDay()-1;if(sd<0)sd=6;
  const dim=new Date(_cY,_cM+1,0).getDate(),dip=new Date(_cY,_cM,0).getDate(),tod=_tod();
  const cells=[];
  for(let i=sd-1;i>=0;i--)cells.push({d:dip-i,m:_cM,y:_cY,o:true});
  for(let d=1;d<=dim;d++)cells.push({d,m:_cM,y:_cY,o:false});
  const rem=(7-cells.length%7)%7;
  for(let d=1;d<=rem;d++)cells.push({d,m:_cM+1>11?0:_cM+1,y:_cM+1>11?_cY+1:_cY,o:true});
  g.innerHTML=cells.map(c=>{
    if(c.o)return '<div class="cal-cell other"><div class="cal-num">'+c.d+'</div><div class="cal-dot"></div></div>';
    const k=_dk(c.y,c.m+1,c.d);
    const meals=_diary[k]||[],kcal=meals.reduce((s,m)=>s+(m.kcal||0),0),tgt=_gD?_gD.target_calories:1800;
    let cls='cal-cell';
    if(meals.length>0)cls+=kcal>tgt?' over-norm':' has-data';else cls+=' no-data';
    if(k===tod&&k!==_cSel)cls+=' is-today';
    if(k===_cSel)cls+=' selected';
    return '<div class="'+cls+'" onclick="pickDay(\''+k+'\')" ><div class="cal-num">'+c.d+'</div><div class="cal-dot"></div></div>';
  }).join('');
}
function calPrev(){_cM--;if(_cM<0){_cM=11;_cY--;}buildCal();}
function calNext(){const n=new Date();if(_cY>n.getFullYear()||(_cY===n.getFullYear()&&_cM>=n.getMonth()))return;_cM++;if(_cM>11){_cM=0;_cY++;}buildCal();}
function pickDay(key){
  _cSel=key;_curActDay=key;
  buildCal();renderDay(key);renderActLog();
  const t=document.getElementById('act-log-title');
  const p=key.split('-');
  if(t)t.textContent=(key===_tod()?'\u0421\u0435\u0433\u043e\u0434\u043d\u044f':p[2]+'.'+p[1])+' \u2014 \u0441\u043f\u0430\u043b\u0435\u043d\u043e';
}
function renderDay(key){
  if(!_gD)return;
  const meals=_diary[key]||[];
  const tk=meals.reduce((s,m)=>s+m.kcal,0),tp=meals.reduce((s,m)=>s+m.p,0),tf=meals.reduce((s,m)=>s+m.f,0),tc=meals.reduce((s,m)=>s+m.c,0);
  const burned=(_actLog[key]||[]).reduce((s,a)=>s+a.kcal,0);
  const adjTarget=_gD.target_calories+burned;
  const pct=Math.min(Math.round(tk/adjTarget*100),100);
  const tP=Math.round(adjTarget*.25/4),tF=Math.round(adjTarget*.3/9),tC=Math.round(adjTarget*.45/4);
  const pP=tP?Math.min(Math.round(tp/tP*100),100):0,pF=tF?Math.min(Math.round(tf/tF*100),100):0,pC=tC?Math.min(Math.round(tc/tC*100),100):0;
  const gl=_gD.goal==='lose'?'\u2193 \u041f\u043e\u0445\u0443\u0434\u0435\u043d\u0438\u0435':_gD.goal==='gain'?'\u2191 \u041d\u0430\u0431\u043e\u0440 \u043c\u0430\u0441\u0441\u044b':'= \u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435';
  const [y,m,d]=key.split('-');const dt=new Date(+y,+m-1,+d);const isToday=key===_tod();
  const lbl=document.getElementById('cal-day-label');
  if(lbl)lbl.textContent=isToday?'\u0421\u0435\u0433\u043e\u0434\u043d\u044f':_DW[dt.getDay()]+', '+d+' '+_MO[+m-1];
  const hero=document.getElementById('day-hero');
  if(hero)hero.innerHTML='<div><div class="hero-label">\u0421\u044a\u0435\u0434\u0435\u043d\u043e</div><div class="hero-kcal">'+tk+'</div><div class="hero-target">\u0438\u0437 '+adjTarget+(burned>0?' <span style="color:var(--green);font-size:11px">(+'+burned+' \u0441\u043f\u043e\u0440\u0442)</span>':'')+' \u043a\u043a\u0430\u043b</div><div class="hero-badge">'+gl+'</div></div><div class="ring-wrap">'+ring(pct,'#3ecf8e')+'<div class="ring-inside"><div class="ring-pct">'+pct+'%</div><div class="ring-sub">\u041d\u041e\u0420\u041c\u0410</div></div></div>';
  const bb=document.getElementById('day-burned-banner');
  if(bb)bb.innerHTML=burned>0?'<div class="burned-banner"><div><div class="burned-lbl">\u0421\u041f\u0410\u041b\u0415\u041d\u041e</div><div class="burned-val">'+burned+'</div><div style="font-size:11px;color:var(--muted)">\u043a\u043a\u0430\u043b</div></div><div style="text-align:right"><div class="burned-lbl">\u0414\u041e\u041f. \u041d\u041e\u0420\u041c\u0410</div><div class="burned-adj">+'+burned+' \u043a\u043a\u0430\u043b</div></div></div>':'';
  const mg=document.getElementById('day-macro-grid');
  if(mg)mg.innerHTML='<div class="macro-card"><div class="macro-ring-wrap">'+mring(pP,'#4a7cdc')+'<div class="macro-value" style="color:#4a7cdc">'+pP+'%</div></div><div class="macro-gram" style="color:#4a7cdc">'+tp+'\u0433</div><div class="macro-label">\u0411\u0435\u043b\u043a\u0438</div></div><div class="macro-card"><div class="macro-ring-wrap">'+mring(pF,'#f59e0b')+'<div class="macro-value" style="color:#f59e0b">'+pF+'%</div></div><div class="macro-gram" style="color:#f59e0b">'+tf+'\u0433</div><div class="macro-label">\u0416\u0438\u0440\u044b</div></div><div class="macro-card"><div class="macro-ring-wrap">'+mring(pC,'#3ecf8e')+'<div class="macro-value" style="color:#3ecf8e">'+pC+'%</div></div><div class="macro-gram" style="color:#3ecf8e">'+tc+'\u0433</div><div class="macro-label">\u0423\u0433\u043b\u0435\u0432\u043e\u0434\u044b</div></div>';
  const mc=document.getElementById('day-meals-card');
  if(mc){const mh=meals.length===0?'<div class="empty" style="padding:24px"><div style="font-size:44px;margin-bottom:10px">\uD83C\uDF7D</div><div style="font-family:FuturaPT,sans-serif;font-size:15px">\u041f\u0443\u0441\u0442\u043e\u0439 \u0434\u0435\u043d\u044c</div></div>':meals.map((m,i)=>'<div class="meal-row"><div class="meal-illus">'+getMealIllus(m.name,i)+'</div><div class="meal-info"><div class="meal-name">'+m.name+'</div><div class="meal-time">'+(m.time||'')+'</div></div><div class="meal-kcal">'+m.kcal+' \u043a\u043a\u0430\u043b</div></div>').join('');mc.innerHTML='<div class="card-title">\uD83C\uDF7D \u041f\u0440\u0438\u0451\u043c\u044b \u043f\u0438\u0449\u0438</div>'+mh;}
}

function initCal(data){
  _gD=data;_diary=data.diary||{};
  const n=new Date();_cY=n.getFullYear();_cM=n.getMonth();_cSel=_tod();
  buildCal();renderDay(_cSel);
}


window.addEventListener('load',async()=>{
  const uid=getTelegramUserId();
  if(uid){const d=await fetchUserData(uid);if(d){renderApp(d);initCal(d);return;}}
  const _ddd=getDemoData();renderApp(_ddd);initCal(_ddd);
});
</script>
